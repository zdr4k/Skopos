name: Skopos Recon Agent

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  models: read
  contents: write

jobs:
  recon:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'recon'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract target
        id: target
        run: |
          TARGET=$(python3 << 'EOF'
          body = """${{ github.event.issue.body }}"""
          for line in body.split('\n'):
              line = line.strip()
              if line and not line.startswith('#') and not line.startswith('_'):
                  print(line)
                  break
          EOF
          )
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get install -y nmap whois whatweb gobuster dirb
          pip install -r requirements.txt

      - name: Run Skopos
        id: skopos
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TARGET: ${{ steps.target.outputs.target }}
        run: |
          output=$(python3 agent.py "$TARGET")
          echo "$output"
          report=$(echo "$output" | grep "REPORT_FILE=" | cut -d= -f2)
          echo "report_file=$report" >> $GITHUB_OUTPUT

      - name: Post report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('${{ steps.skopos.outputs.report_file }}', 'utf8');
            if (!report.trim()) {
              core.setFailed('Report is empty');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

      - name: Save report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "Add recon report for ${{ steps.target.outputs.target }}" || echo "Nothing to commit"
          git push